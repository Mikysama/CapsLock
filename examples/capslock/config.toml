# Copy to .capslock/config.toml when project-specific settings are needed.
[model]
# api_key is intentionally omitted: use CAPSLOCK_API_KEY or DEEPSEEK_API_KEY.
base_url = "https://api.deepseek.com"
model = "deepseek-v4-flash"
timeout_seconds = 60
max_turns = 6
max_context_messages = 24
command_timeout_seconds = 120
command_output_bytes = 100000
# Optional USD prices per million tokens for /cost.
input_cost_per_million = 0
output_cost_per_million = 0
# Put CAPSLOCK_TAVILY_API_KEY (or TAVILY_API_KEY) in .env or the shell, never this file.
web_timeout_seconds = 20
web_max_bytes = 500000
web_max_redirects = 3
mcp_timeout_seconds = 30
mcp_output_bytes = 100000
# full_access | approve_for_me | ask_for_approval
permission_mode = "approve_for_me"

[memory]
# Project policy: false blocks add/edit/import/forget/undo/purge but keeps reads and exports available.
enabled = true
